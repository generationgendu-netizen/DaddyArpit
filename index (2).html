<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentEase — Rent Vehicles in Uttarakhand, The Honest Way</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --saffron: #FF6B1A;
  --saffron-light: #FF8C42;
  --navy: #0D1B2A;
  --navy-mid: #1B2D42;
  --cream: #FFF8F0;
  --gold: #F4C430;
  --mint: #00C9A7;
  --text-dark: #1A1A2E;
  --text-muted: #6B7280;
  --card-bg: #FFFFFF;
  --border: #E8E0D6;
  --verified: #00C9A7;
  --market: #6366F1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); overflow-x: hidden; }
h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

/* ───── NAV ───── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 40px;
  background: rgba(13, 27, 42, 0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,107,26,0.2);
}
.logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.logo span { color: var(--saffron); }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--saffron); }
.nav-cta { background: var(--saffron); color: #fff !important; padding: 10px 22px; border-radius: 100px; font-weight: 600 !important; }

/* ───── HERO ───── */
.hero {
  min-height: 100vh;
  background: var(--navy);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 120px 40px 60px;
  position: relative;
  overflow: hidden;
}
.hero-bg-pattern {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle at 20% 50%, rgba(255,107,26,0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(99,102,241,0.1) 0%, transparent 40%);
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,107,26,0.15); border: 1px solid rgba(255,107,26,0.3);
  color: var(--saffron-light); padding: 6px 16px; border-radius: 100px;
  font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 28px; position: relative;
}
.hero h1 { font-size: clamp(2.8rem, 6vw, 5rem); font-weight: 800; color: #fff; text-align: center; line-height: 1.08; max-width: 850px; position: relative; }
.hero h1 em { font-style: normal; color: var(--saffron); }
.hero-sub { color: rgba(255,255,255,0.6); font-size: 1.1rem; text-align: center; margin: 20px 0 48px; max-width: 560px; line-height: 1.7; position: relative; }

/* ───── SEARCH BOX ───── */
.search-box { background: #fff; border-radius: 20px; padding: 28px 32px; width: 100%; max-width: 860px; box-shadow: 0 32px 80px rgba(0,0,0,0.35); position: relative; z-index: 2; }
.search-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
.stab { padding: 8px 20px; border-radius: 100px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); transition: all 0.2s; }
.stab.active { background: var(--saffron); border-color: var(--saffron); color: #fff; }
.search-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
.sfield label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.sfield input, .sfield select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.9rem; background: #FAFAFA; outline: none; }
.search-btn { background: var(--saffron); color: #fff; border: none; border-radius: 10px; padding: 13px 28px; font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: transform 0.15s; }

/* ───── MAP SECTION ───── */
.map-section { background: #F0EBE3; padding: 80px 40px; }
.map-container { display: grid; grid-template-columns: 1fr 380px; gap: 28px; margin-top: 40px; min-height: 600px; }
.map-visual { background: var(--navy); border-radius: 20px; position: relative; overflow: hidden; min-height: 580px; }
.map-label { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); color: #fff; font-size: 0.8rem; font-weight: 600; padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; gap: 6px; z-index: 5; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.map-pin { position: absolute; cursor: pointer; transition: transform 0.2s; }
.pin-body { width: 40px; height: 40px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.pin-inner { transform: rotate(45deg); font-size: 1rem; }
.pin-popup { position: absolute; bottom: 55px; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 12px; padding: 12px 16px; min-width: 180px; box-shadow: 0 12px 32px rgba(0,0,0,0.3); opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 20; }
.map-pin:hover .pin-popup { opacity: 1; pointer-events: all; }

/* ───── VEHICLES ───── */
.vehicles-section { background: #fff; padding: 80px 40px; }
.vehicles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
.vehicle-card { background: var(--cream); border: 1.5px solid var(--border); border-radius: 20px; overflow: hidden; transition: transform 0.2s; cursor: pointer; }
.vc-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 5rem; background: #e8e0d0; position: relative; }
.vc-body { padding: 18px 20px; }
.vc-book-btn { width: 100%; padding: 12px; background: var(--navy); color: #fff; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; }

/* ───── FOOTER ───── */
footer { background: var(--navy); padding: 60px 40px 32px; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 48px; }
.footer-logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: #fff; }
.footer-logo span { color: var(--saffron); }
.footer-desc { color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-top: 10px; }

/* Sections Common */
section { padding: 80px 40px; }
.sec-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--saffron); margin-bottom: 10px; }
.sec-title { font-size: 2.4rem; font-weight: 800; color: var(--text-dark); margin-bottom: 12px; }
.sec-sub { font-size: 1rem; color: var(--text-muted); max-width: 520px; margin-bottom: 40px; }

@media (max-width: 900px) {
  .search-grid { grid-template-columns: 1fr; }
  .map-container { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr; }
}
</style>
</head>
